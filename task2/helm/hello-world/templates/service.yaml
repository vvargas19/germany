apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hello-world
  labels:
    app: {{ .Release.Name }}-hello-world
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
  selector:
    app: {{ .Release.Name }}-hello-world
