apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app-name: hello-world
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: os
                operator: Exists
      containers:
      - name: hello-world
        image: hello-app:latest
        ports:
        - containerPort: 8081
        resources:
          limits:
            memory: "30Mi"
            cpu: "100m"
          requests:
            memory: "20Mi"
            cpu: "50m"
        imagePullPolicy: Never
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: hello-app
spec:
  selector:
    app: hello-world
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: hello-app
